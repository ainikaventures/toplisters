# Production stack. Run from the repo root:
#   docker compose -f docker/docker-compose.prod.yml --env-file .env up -d
#
# `deploy.sh` wraps that with build + migration + health check.
#
# Caddy terminates TLS for toplisters.xyz (auto Let's Encrypt) and
# reverse-proxies port 80/443 to the Next.js web service. Postgres +
# Redis are private (no published ports). The worker is also private —
# it talks to Postgres + Redis over the compose network only.
#
# Two-app isolation rules (info/INFRASTRUCTURE.md §1):
#   - Dedicated network `toplisters_net` so SplitAI on the same host
#     can run on its own bridge without name collisions
#   - Postgres listens on 5433 internally (5432 reserved for SplitAI's
#     conventions on this shared box)
#   - Redis pinned to DB index 1 (DB 0 unused; SplitAI uses DB 2)
#   - All containers prefixed `toplisters-`

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      # NEXT_PUBLIC_* vars must be available at build time to be inlined
      # into the client bundle. env_file applies only at runtime, so we
      # forward them explicitly here. Falls back to empty string when a
      # given var isn't in .env so the build doesn't fail.
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_CLARITY_ID: ${NEXT_PUBLIC_CLARITY_ID:-}
    container_name: toplisters-web
    env_file: ../.env
    environment:
      NODE_ENV: production
      # Next.js standalone reads HOSTNAME and binds to it. Docker sets it to
      # the container ID by default, so the server only listens on its own
      # hostname — `curl localhost:3000` then fails (incl. the in-image
      # HEALTHCHECK). Pin to 0.0.0.0 so loopback + container IP both work.
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://toplisters_app:${TOPLISTERS_APP_PASSWORD}@postgres:5433/${POSTGRES_DB:-toplisters}?schema=public
      MIGRATION_DATABASE_URL: postgresql://${POSTGRES_USER:-toplisters}:${POSTGRES_PASSWORD}@postgres:5433/${POSTGRES_DB:-toplisters}?schema=public
      REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [toplisters_net]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: toplisters-worker
    env_file: ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://toplisters_app:${TOPLISTERS_APP_PASSWORD}@postgres:5433/${POSTGRES_DB:-toplisters}?schema=public
      REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [toplisters_net]

  postgres:
    image: postgres:16-alpine
    container_name: toplisters-postgres
    command: postgres -p 5433
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-toplisters}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-toplisters}
      # First-init script reads this to create the limited runtime role.
      # For existing volumes that pre-date this script, run
      # `scripts/setup-app-user.sh` once instead.
      TOPLISTERS_APP_PASSWORD: ${TOPLISTERS_APP_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toplisters} -d ${POSTGRES_DB:-toplisters} -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [toplisters_net]

  redis:
    image: redis:7-alpine
    container_name: toplisters-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [toplisters_net]

  caddy:
    image: caddy:2-alpine
    container_name: toplisters-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped
    networks: [toplisters_net]

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  toplisters_net:
    driver: bridge
