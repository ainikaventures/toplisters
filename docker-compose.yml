# Coolify deploy stack — web + worker only.
#
# Postgres and Redis are EXTERNAL Coolify-managed resources, reached via
# DATABASE_URL / REDIS_URL injected by Coolify (NOT shipped here). There are
# NO host `ports:` — Traefik reaches the web service over the internal
# network on container port 8080 (host port 8000 is reserved). TLS is
# terminated at the proxy; the app speaks plain HTTP.
#
# Migrations run as a Coolify pre-deploy command (see DEPLOY.md), not in
# the web entrypoint, so concurrent web replicas never race the schema.
#
# Local development uses docker-compose.dev.yml for Postgres + Redis.

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      # NEXT_PUBLIC_* must be inlined at build time. Coolify forwards these
      # from the app's build-time env. Empty fallbacks keep the build green.
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_SPORTS_URL: ${NEXT_PUBLIC_SPORTS_URL:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_CLARITY_ID: ${NEXT_PUBLIC_CLARITY_ID:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Bind the standalone server to all interfaces on the platform port.
      HOSTNAME: 0.0.0.0
      PORT: 8080
    # `expose` (not `ports`) — visible to the proxy on the internal network,
    # no host-port binding.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
    # No ports — headless background process talking outbound to DB + Redis.
