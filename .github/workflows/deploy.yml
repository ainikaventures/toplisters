# Production deploy via SSH. Triggers `deploy.sh` on the server, which
# does git pull → build → migrate → roll containers → health check.
#
# ── BEFORE ENABLING THE PUSH TRIGGER ──────────────────────────────────────
# Add these GitHub repository secrets (Settings → Secrets and variables →
# Actions → New repository secret):
#
#   PROD_HOST       e.g. 1.2.3.4 or server.toplisters.xyz
#   PROD_USER       deploy user with sudo / docker rights
#   PROD_SSH_KEY    private key matching one in ~/.ssh/authorized_keys on server
#   PROD_SSH_PORT   (optional, default 22)
#
# Then uncomment the `push:` trigger below. Until then, the workflow is
# manual-only — Actions tab → "Deploy to Production" → "Run workflow".

name: Deploy to Production

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sanity-check secrets
        run: |
          [[ -n "${{ secrets.PROD_HOST }}" ]] || (echo "PROD_HOST missing" && exit 1)
          [[ -n "${{ secrets.PROD_USER }}" ]] || (echo "PROD_USER missing" && exit 1)
          [[ -n "${{ secrets.PROD_SSH_KEY }}" ]] || (echo "PROD_SSH_KEY missing" && exit 1)

      - name: Run deploy.sh on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /srv/toplisters
            ./deploy.sh
          script_stop: true
