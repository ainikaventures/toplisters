# DEPRECATED (Coolify migration, 2026-06-09).
#
# This SSH-into-the-VPS-and-run-deploy.sh flow is the LEGACY deploy path
# for the self-managed OVH box (Caddy + docker-compose.prod.yml). Coolify
# now deploys on git-push to main — see DEPLOY.md. The push trigger has
# been REMOVED so merges to main no longer fire this (the prod compose it
# depended on was deleted in the migration). Kept as `workflow_dispatch`
# only, for emergency manual use against the legacy box during cutover;
# delete this file once the VPS is decommissioned.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   PROD_HOST       e.g. 1.2.3.4 or server.toplisters.xyz
#   PROD_USER       deploy user with sudo / docker rights
#   PROD_SSH_KEY    private key matching one in ~/.ssh/authorized_keys on server
#   PROD_SSH_PORT   (optional, default 22)

name: Deploy to Production (legacy VPS — manual only)

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Belt and braces: appleboy/ssh-action has been seen to hang after
    # deploy.sh exits cleanly (no PTY close from the server side). The
    # job-level timeout force-kills a stuck run; the step-level
    # command_timeout below bounds the script's own runtime.
    timeout-minutes: 15
    steps:
      - name: Sanity-check secrets
        run: |
          [[ -n "${{ secrets.PROD_HOST }}" ]] || (echo "PROD_HOST missing" && exit 1)
          [[ -n "${{ secrets.PROD_USER }}" ]] || (echo "PROD_USER missing" && exit 1)
          [[ -n "${{ secrets.PROD_SSH_KEY }}" ]] || (echo "PROD_SSH_KEY missing" && exit 1)

      - name: Run deploy.sh on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          key: ${{ secrets.PROD_SSH_KEY }}
          # Deploy itself takes ~4 min (build is the slow part). 10m leaves
          # headroom for the slowest case (fresh image cache) but caps the
          # post-script SSH hang at 10 min instead of unbounded.
          command_timeout: 10m
          script: |
            cd /opt/toplisters
            ./deploy.sh
          script_stop: true
