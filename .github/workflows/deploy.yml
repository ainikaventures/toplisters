# Production deploy via SSH. Triggers `deploy.sh` on the server, which
# does git pull → build → migrate → roll containers → health check.
#
# Auto-runs on push to main. Can also be fired manually from the Actions tab.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   PROD_HOST       e.g. 1.2.3.4 or server.toplisters.xyz
#   PROD_USER       deploy user with sudo / docker rights
#   PROD_SSH_KEY    private key matching one in ~/.ssh/authorized_keys on server
#   PROD_SSH_PORT   (optional, default 22)

name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Belt and braces: appleboy/ssh-action has been seen to hang after
    # deploy.sh exits cleanly (no PTY close from the server side). The
    # job-level timeout force-kills a stuck run; the step-level
    # command_timeout below bounds the script's own runtime.
    timeout-minutes: 15
    steps:
      - name: Sanity-check secrets
        run: |
          [[ -n "${{ secrets.PROD_HOST }}" ]] || (echo "PROD_HOST missing" && exit 1)
          [[ -n "${{ secrets.PROD_USER }}" ]] || (echo "PROD_USER missing" && exit 1)
          [[ -n "${{ secrets.PROD_SSH_KEY }}" ]] || (echo "PROD_SSH_KEY missing" && exit 1)

      - name: Run deploy.sh on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          key: ${{ secrets.PROD_SSH_KEY }}
          # Deploy itself takes ~4 min (build is the slow part). 10m leaves
          # headroom for the slowest case (fresh image cache) but caps the
          # post-script SSH hang at 10 min instead of unbounded.
          command_timeout: 10m
          script: |
            cd /opt/toplisters
            ./deploy.sh
          script_stop: true
